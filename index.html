<script>
// Replace these samples with your real fixes. x/y are image coordinates on the 1914 x 1419 background.
// Tip: set EDIT_MODE = true, open the page, click a fix, then copy the x/y shown in the browser console.
const EDIT_MODE = true;
const fixes = [
  { name: "FIX1", x: 944, y: 477, type: "triangle" },
  { name: "FIX2", x: 1069, y: 824, type: "square" },
  { name: "FIX3", x: 945, y: 118, type: "vortac" },
  { name: "FIX4", x: 1547, y: 531, type: "vortac" },
  { name: "FIX5", x: 523, y: 1099, type: "square" }
];

let pool = [];
let current = null;
let correct = 0;
let total = 0;
const answer = document.getElementById('answer');
const target = document.getElementById('target');
const score = document.getElementById('score');
const overlay = document.getElementById('overlay');

function normalize(s) { return s.trim().toUpperCase().replace(/\s+/g, ''); }
function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }
function updateScore() { score.textContent = `${correct} / ${total}`; }
function clearState() { answer.classList.remove('correct','wrong'); }

function nextQuestion() {
  clearState();
  answer.value = '';
  answer.focus();
  if (pool.length === 0) pool = shuffle(fixes);
  current = pool.pop();
  target.setAttribute('cx', current.x);
  target.setAttribute('cy', current.y);
  target.setAttribute('r', current.type === 'vortac' ? 36 : 28);
  target.style.display = 'block';
}

function checkAnswer() {
  if (!current || !answer.value.trim()) return;
  if (normalize(answer.value) === normalize(current.name)) {
    answer.classList.add('correct'); answer.classList.remove('wrong');
    correct++; total++; updateScore();
    setTimeout(nextQuestion, 650);
  } else {
    answer.classList.add('wrong'); answer.classList.remove('correct');
  }
}

answer.addEventListener('input', checkAnswer);
answer.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });

document.getElementById('skip').addEventListener('click', () => {
  if (!current) return;
  answer.classList.remove('wrong');
  answer.value = current.name;
  total++; updateScore();
  setTimeout(nextQuestion, 2000);
});

overlay.addEventListener('click', e => {
  if (!EDIT_MODE) return;
  const pt = overlay.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const p = pt.matrixTransform(overlay.getScreenCTM().inverse());
  console.log(`{ name: "NAME", x: ${Math.round(p.x)}, y: ${Math.round(p.y)}, type: "triangle" },`);
});

  

updateScore();
nextQuestion();

  document.addEventListener('click', (e) => {
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();

  const x = Math.round(((e.clientX - rect.left) / rect.width) * 1914);
  const y = Math.round(((e.clientY - rect.top) / rect.height) * 1419);

  console.log(`x: ${x}, y: ${y}`);
});
  
</script>
